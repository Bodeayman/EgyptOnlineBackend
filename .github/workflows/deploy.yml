name: EgyptOnline CI/CD

on:
  push:
    branches: [ "master" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore EgyptOnline.sln

      - name: Build
        run: dotnet build EgyptOnline.sln --no-restore --configuration Release

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: docker build --no-cache -t bodeayman/egypt_online_ma3ak:latest .

      - name: Push image
        run: docker push bodeayman/egypt_online_ma3ak:latest

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/egyptonlinema3ak
            sudo ./deploy.sh

      - name: Health check
        run: |
          sleep 15
          curl -f https://egyptonlinema3ak.com/health