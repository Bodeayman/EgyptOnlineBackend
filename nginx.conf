server {
    listen 80;
    server_name _;

    # Serve static images
    location /images/ {
        alias /usr/share/nginx/html/images/;
        autoindex off;
        access_log off;
        add_header Cache-Control "public, max-age=31536000";
    }

    # Default behavior (optional)
    location / {
        return 404;
    }
}
